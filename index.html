<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">

  <title>えいごアドベンチャー</title>
  <style>
    body { text-align: center; font-family: 'Helvetica Neue', Arial, sans-serif; padding: 15px; background-color: #f0f8ff; color: #333; margin: 0; }
    .container { max-width: 480px; margin: 0 auto; background: white; padding: 25px; border-radius: 24px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    h2 { color: #0984e3; font-size: 26px; margin-top: 0; }
    .btn-mode { font-size: 18px; padding: 12px; margin: 8px 0; width: 100%; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; color: white; }
    .quiz-box { background: #e8f4f8; padding: 15px; border-radius: 18px; margin-bottom: 20px; border: 3px dashed #74b9ff; }
    .emoji-graphic { font-size: 60px; margin: 10px 0; }
    input[type="text"] { font-size: 30px; width: 80%; text-align: center; padding: 10px; border: 3px solid #b2bec3; border-radius: 16px; margin-bottom: 10px; }
    .action-btn { font-size: 20px; padding: 12px 25px; margin: 6px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; color: white; }
    .btn-mic { background-color: #3498db; }
    .btn-stop { background-color: #e74c3c; }
    .btn-reset { background-color: #ffeaa7; color: #d35400; font-size: 13px; padding: 8px 16px; margin-top: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    #result { font-size: 24px; font-weight: bold; margin: 15px 0; min-height: 40px; }
    .zukan-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 15px; padding: 10px; background: #fffcf0; border-radius: 10px; border: 3px dashed #ffcb74; }
    .zukan-item { background: white; border-radius: 8px; padding: 5px; text-align: center; font-size: 10px; }
    .monster-anim { display: inline-block; animation: bounce 1.5s infinite; }
    @keyframes bounce { 0%, 100%{transform:translateY(0)} 40%{transform:translateY(-20px)} }
  </style>
</head>
<body>

<div class="container" id="top-screen">
  <h2>🌎 えいごアドベンチャー</h2>
  <button class="btn-mode" style="background:#fdcb6e;color:#333;" onclick="startGame('alphabet')">🔤 アルファベット</button>
  <button class="btn-mode" style="background:#00b894;" onclick="startGame('animal')">🦁 どうぶつ</button>
  <button class="btn-mode" style="background:#0984e3;" onclick="startGame('greeting')">👋 あいさつ</button>
  <button class="btn-mode" style="background:#e84393;" onclick="startGame('food')">🍎 たべもの</button>
  <button class="btn-mode" style="background:#6c5ce7;" onclick="startGame('color')">🎨 いろ</button>
  <button class="btn-mode" style="background:#d63031;" onclick="startGame('number')">🔢 すうじ</button>
  <button class="btn-mode" style="background:#f1c40f;color:#333;" onclick="showZukan()">📖 か電ずかん</button>
</div>

<div class="container" id="game-screen" style="display: none;">
  <div class="quiz-box">
    <div class="emoji-graphic" id="q-emoji"></div>
    <div id="q-word" style="font-size:24px; font-weight:bold;"></div>
  </div>
  <input type="text" id="answer" placeholder="答えを入力">
  <br>
  <button class="action-btn" style="background:#2ecc71;" onclick="checkAnswer()">👆 こたえる</button>
  <button class="action-btn btn-mic" id="btn-mic-auto" onclick="toggleAutoMic()">▶️ ずっと声でこたえる</button>
  <div id="result"></div>
  <button class="btn-reset" onclick="goBackToTop()">🏠 トップに戻る</button>
</div>

<div class="container" id="zukan-screen" style="display: none;">
  <h2>📖 か電ずかん</h2>
  <div id="zukan-count"></div>
  <div class="zukan-grid" id="zukan-grid"></div>
  <button class="btn-reset" onclick="goBackToTop()">🏠 戻る</button>
</div>

  const modes = {
    alphabet: [{en:"A",match:["a","えー"]},{en:"B",match:["b","びー"]}],
    animal: [{en:"Dog",match:["dog","どっぐ"]},{en:"Cat",match:["cat","きゃっと"]}],
    greeting: [{en:"Hello",match:["hello","はろー"]},{en:"Bye",match:["bye","ばいばい"]}],
    food: [{en:"Apple",match:["apple","あっぷる"]},{en:"Pizza",match:["pizza","ぴざ"]}],
    color: [{en:"Red",match:["red","れっど"]},{en:"Blue",match:["blue","ぶるー"]}],
    number: [{en:"One",match:["one","わん"]},{en:"Two",match:["two","つー"]}]
  };
  
  let currentMode = '', currentQuestion = {}, isAutoMic = false, isSpeaking = false, currentRecognition = null;

  function startGame(mode) {
    currentMode = mode;
    document.getElementById('top-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';
    setNextQuestion();
  }

  function setNextQuestion() {
    let list = modes[currentMode];
    currentQuestion = list[Math.floor(Math.random()*list.length)];
    document.getElementById('q-word').innerText = currentQuestion.en;
    document.getElementById('answer').value = "";
    document.getElementById('result').innerHTML = "";
    speakEng(currentQuestion.en, () => { if(isAutoMic) startMic(); });
  }

  function checkAnswer(val) {
    let input = val || document.getElementById('answer').value;
    let match = currentQuestion.match.some(m => input.toLowerCase().includes(m));
    if (match) {
      let idx = Math.floor(Math.random()*kadenList.length);
      document.getElementById('result').innerHTML = `<div class="monster-anim" style="font-size:50px">${kadenList[idx].e}</div><br><strong>${kadenList[idx].n} ゲットだぜ！</strong>`;
      speakJpn(kadenList[idx].n + "ゲットだぜ", () => setTimeout(setNextQuestion, 2000));
    } else {
      document.getElementById('result').innerHTML = "❌ もういっかい！";
      speakJpn("もういちど！");
    }
  }

  function toggleAutoMic() {
    isAutoMic = !isAutoMic;
    let btn = document.getElementById('btn-mic-auto');
    btn.innerHTML = isAutoMic ? "⏹️ ストップ" : "▶️ ずっと声で";
    btn.className = "action-btn " + (isAutoMic ? "btn-stop" : "btn-mic");
    if(isAutoMic) startMic();
  }

  function startMic() {
    const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    rec.lang = 'ja-JP';
    rec.start();
    rec.onresult = (e) => checkAnswer(e.results[0][0].transcript);
  }

  function speakEng(t, cb) { 
    let s = new SpeechSynthesisUtterance(t); s.lang='en-US'; s.onend=cb; window.speechSynthesis.speak(s); 
  }
  function speakJpn(t, cb) { 
    let s = new SpeechSynthesisUtterance(t); s.lang='ja-JP'; s.onend=cb; window.speechSynthesis.speak(s); 
  }

  function goBackToTop() { location.reload(); }
  function showZukan() { /* 図鑑表示ロジック */ }
