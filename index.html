let currentMode = "";
let currentQuestion = {};
let isAutoMic = false;
let isSpeaking = false;
let currentRecognition = null;

/* 子どもの発音・音声認識の表記ゆれを、できるだけゆるく判定する */
function normalizeAnswer(value) {
  return (value || "")
    .normalize("NFKC")
    .toLowerCase()
    .replace(/[ァ-ヶ]/g, char => String.fromCharCode(char.charCodeAt(0) - 0x60))
    .replace(/[ー−－\-\s・.,!?！？'"’]/g, "")
    .replace(/[^a-z0-9ぁ-ゖ一-龠]/g, "");
}

function editDistance(a, b) {
  const row = Array.from({ length: b.length + 1 }, (_, i) => i);
  for (let i = 1; i <= a.length; i++) {
    let previous = row[0];
    row[0] = i;
    for (let j = 1; j <= b.length; j++) {
      const saved = row[j];
      row[j] = Math.min(
        row[j] + 1,
        row[j - 1] + 1,
        previous + (a[i - 1] === b[j - 1] ? 0 : 1)
      );
      previous = saved;
    }
  }
  return row[b.length];
}

function isLooseMatch(input, question) {
  const spoken = normalizeAnswer(input);
  if (!spoken) return false;

  return question.match.some(alias => {
    const target = normalizeAnswer(alias);
    if (!target) return false;

    // 1文字のアルファベットは、ほかの単語に紛れないよう完全一致だけにする
    if (target.length === 1) return spoken === target;

    // 発話の前後についた言葉、空白、記号は無視
    if (spoken.includes(target) || target.includes(spoken)) return true;

    // 長めの言葉だけ、1〜2文字ぶんの聞き取り違いを許容
    const maxError = target.length >= 9 ? 2 : target.length >= 5 ? 1 : 0;
    return maxError > 0 && Math.abs(spoken.length - target.length) <= maxError
      && editDistance(spoken, target) <= maxError;
  });
}

function startGame(mode) {
  currentMode = mode;
  document.getElementById("top-screen").style.display = "none";
  document.getElementById("game-screen").style.display = "block";
  setNextQuestion();
}

function setNextQuestion() {
  const list = modes[currentMode];
  currentQuestion = list[Math.floor(Math.random() * list.length)];
  document.getElementById("q-emoji").innerText = currentQuestion.emoji || "⭐";
  document.getElementById("q-word").innerText = currentQuestion.en;
  document.getElementById("answer").value = "";
  document.getElementById("result").innerHTML = "";

  speak(currentQuestion.voice || currentQuestion.en, currentQuestion.lang || "en-US", () => {
    if (isAutoMic) {
      setTimeout(startMic, 250);
    }
  });
}

function checkAnswer(value) {
  const input = value || document.getElementById("answer").value;
  const match = isLooseMatch(input, currentQuestion);

  stopMic();

  if (match) {
    const idx = Math.floor(Math.random() * kadenList.length);
    document.getElementById("result").innerHTML =
      `<div class="monster-anim" style="font-size:50px">${kadenList[idx].e}</div>
       <br><strong>${kadenList[idx].n} ゲットだぜ！</strong>`;

    // 正解後は、指定どおり5秒後に次の問題へ
    speakJpn(kadenList[idx].n + " ゲットだぜ！", () => {
      setTimeout(setNextQuestion, 5000);
    });
  } else {
    document.getElementById("result").innerHTML = "❌ もういっかい！<br><span style='font-size:14px;'>ゆっくり言っても大丈夫だよ</span>";
    speakJpn("もういちど。ゆっくりで だいじょうぶ！", () => {
      if (isAutoMic) setTimeout(startMic, 350);
    });
  }
}

function toggleAutoMic() {
  isAutoMic = !isAutoMic;
  const btn = document.getElementById("btn-mic-auto");

  btn.innerHTML = isAutoMic ? "⏹️ ストップ" : "▶️ ずっと声でこたえる";
  btn.className = "action-btn " + (isAutoMic ? "btn-stop" : "btn-mic");

  if (isAutoMic) {
    setTimeout(startMic, 200);
  } else {
    stopMic();
  }
}

function startMic() {
  if (!isAutoMic || isSpeaking || currentRecognition) return;

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    document.getElementById("result").innerHTML =
      "🎙️ このブラウザでは音声入力が使えません。<br><span style='font-size:14px;'>Chrome または Edge で試してね。</span>";
    isAutoMic = false;
    document.getElementById("btn-mic-auto").innerHTML = "▶️ ずっと声でこたえる";
    document.getElementById("btn-mic-auto").className = "action-btn btn-mic";
    return;
  }

  const recognition = new SpeechRecognition();
  currentRecognition = recognition;

  // 日本語設定で、カタカナ発音・日本語回答を拾いやすくする
  recognition.lang = "ja-JP";
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.maxAlternatives = 5;

  let resultHandled = false;

  recognition.onresult = event => {
    const candidates = Array.from(event.results[0])
      .map(item => item.transcript)
      .filter(Boolean);

    // 複数候補の中に正解に近いものがあれば、それを最優先
    const matched = candidates.find(candidate => isLooseMatch(candidate, currentQuestion));
    resultHandled = true;
    checkAnswer(matched || candidates[0] || "");
  };

  recognition.onerror = event => {
    if (event.error === "not-allowed" || event.error === "service-not-allowed") {
      document.getElementById("result").innerHTML =
        "🎙️ マイクの許可が必要です。ブラウザの設定でマイクをオンにしてね。";
      isAutoMic = false;
      document.getElementById("btn-mic-auto").innerHTML = "▶️ ずっと声でこたえる";
      document.getElementById("btn-mic-auto").className = "action-btn btn-mic";
    }
  };

  recognition.onend = () => {
    if (currentRecognition === recognition) currentRecognition = null;

    // 無音・聞き取り失敗時だけ、同じ問題でもう一度聞く
    if (isAutoMic && !isSpeaking && !resultHandled) {
      setTimeout(startMic, 450);
    }
  };

  try {
    recognition.start();
  } catch (error) {
    currentRecognition = null;
  }
}

function stopMic() {
  if (currentRecognition) {
    const recognition = currentRecognition;
    currentRecognition = null;
    try {
      recognition.stop();
    } catch (error) {
      // すでに停止済みなら何もしない
    }
  }
}

function speak(text, lang, callback) {
  window.speechSynthesis.cancel();
  isSpeaking = true;

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = lang;
  utterance.rate = 0.82; // 子どもが聞き取りやすい、少しゆっくりした速さ

  utterance.onend = () => {
    isSpeaking = false;
    if (callback) callback();
  };
  utterance.onerror = () => {
    isSpeaking = false;
    if (callback) callback();
  };

  window.speechSynthesis.speak(utterance);
}

function speakEng(text, callback) {
  speak(text, "en-US", callback);
}

function speakJpn(text, callback) {
  speak(text, "ja-JP", callback);
}

function goBackToTop() {
  stopMic();
  window.speechSynthesis.cancel();
  location.reload();
}
